<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="member-title-tag">Member Application - Nasser Scouts</title>
    <link rel="icon" href="../assets/images/favicon.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="shortcut icon" href="../assets/images/logo.svg" type="image/x-icon">
</head>
<body>
    <a href="../index.html" class="back" data-i18n="member-back">← Back</a>
    <div class="application-page">
        <div class="application-banner">
            <img src="../assets/images/app.jpeg" alt="Member registration banner">
        </div>

        <section class="application-header">
            <h1 data-i18n="member-page-title">Apply to Join</h1>
            <p data-i18n="member-page-desc">Complete the member registration form and attach your supporting documents to submit your application.</p>
        </section>

        <div class="application-card">
            <form id="member-application-form">
                <div class="form-grid">
                    <div class="input-group">
                        <label for="full-name" data-i18n="member-fullname-label">Full Name</label>
                        <input id="full-name" type="text" class="input" required data-i18n-placeholder="member-fullname-placeholder" placeholder="Enter your full name">
                    </div>
                    <div class="input-group">
                        <label for="id-number" data-i18n="member-nationalid-label">National ID</label>
                        <input id="id-number" type="text" class="input" required data-i18n-placeholder="member-nationalid-placeholder" placeholder="Enter national ID">
                    </div>
                    <div class="input-group">
                        <label for="telephone" data-i18n="member-phone-label">Telephone</label>
                        <input id="telephone" type="tel" class="input" required data-i18n-placeholder="member-phone-placeholder" placeholder="Enter phone number">
                    </div>
                    <div class="input-group">
                        <label for="email" data-i18n="member-email-label">Email Address</label>
                        <input id="email" type="email" class="input" required data-i18n-placeholder="member-email-placeholder" placeholder="Enter email address">
                    </div>
                </div>

                <div class="form-grid birth-row">
                    <div class="input-group">
                        <label for="birth-year" data-i18n="member-birth-year-label">Birth Year</label>
                        <input id="birth-year" type="number" placeholder="Year" min="1900" max="2026" class="input" required>
                    </div>
                    <div class="input-group">
                        <label for="birth-month" data-i18n="member-birth-month-label">Birth Month</label>
                        <input id="birth-month" type="number" placeholder="Month" min="1" max="12" class="input" required>
                    </div>
                    <div class="input-group">
                        <label for="birth-day" data-i18n="member-birth-day-label">Birth Day</label>
                        <input id="birth-day" type="number" placeholder="Day" min="1" max="31" class="input" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="scouting-stage" data-i18n="member-stage-label">Calculated Scouting Stage</label>
                    <input id="scouting-stage" type="text" class="input" readonly data-i18n-placeholder="member-stage-placeholder" placeholder="Stage will auto-evaluate">
                </div>

                <div class="file-row">
                    <div class="file-group">
                        <label for="upload-personal-photo" data-i18n="member-photo-label">Personal Photo</label>
                        <div class="file-drop-area" id="personal-photo-dropzone">
                            <span class="file-prompt" data-i18n="member-photo-prompt">Drag & drop a photo or browse</span>
                            <div class="file-status hidden">
                                <span class="file-status-text"></span>
                                <button type="button" class="file-clear-button" aria-label="Clear selected personal photo">×</button>
                            </div>
                            <input id="upload-personal-photo" type="file" accept="image/*" required>
                        </div>
                    </div>
                    <div class="file-group">
                        <label for="upload-id-cert" data-i18n="member-doc-label">ID / Document</label>
                        <div class="file-drop-area" id="id-cert-dropzone">
                            <span class="file-prompt" data-i18n="member-doc-prompt">Upload ID card or certificate</span>
                            <div class="file-status hidden">
                                <span class="file-status-text"></span>
                                <button type="button" class="file-clear-button" aria-label="Clear selected document">×</button>
                            </div>
                            <input id="upload-id-cert" type="file" accept="image/*,application/pdf" required>
                        </div>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="member-terms" required>
                    <label for="member-terms" data-i18n="member-terms">I agree that I have read the Safe from Harm policies and group bylaws.</label>
                </div>

                <button type="submit" class="register" data-i18n="member-submit">Submit Application</button>
            </form>
        </div>
    </div>

    <script>
        const birthYearInput = document.querySelector('#birth-year');
        const scoutingStageInput = document.querySelector('#scouting-stage');

        function computeScoutingStage() {
            const year = parseInt(birthYearInput.value, 10);
            if (!year || year < 1900) {
                scoutingStageInput.value = '';
                return;
            }
            const currentYear = 2026;
            const age = currentYear - year;
            let stage = '';
            
            if (age >= 3 && age < 7) {
                stage = 'Joey / البراعم';
            } else if (age >= 7 && age < 11) {
                stage = 'Cubs & Brownies / الأشبال والزهرات';
            } else if (age >= 11 && age < 15) {
                stage = 'Scouts & Guides / الكشافة والمرشدات';
            } else if (age >= 15 && age < 18) {
                stage = 'Ventures / المتقدم';
            } else if (age >= 18 && age <= 22) {
                stage = 'Rovers / الجوالة والدليلات';
            } else {
                stage = 'Age outside scout brackets';
            }
            scoutingStageInput.value = stage;
        }
        birthYearInput.addEventListener('input', computeScoutingStage);
    </script>
    <script>
        function initFileDropzone(inputId, dropzoneId) {
            const input = document.getElementById(inputId);
            const dropzone = document.getElementById(dropzoneId);
            if (!input || !dropzone) return;

            const prompt = dropzone.querySelector('.file-prompt');
            const status = dropzone.querySelector('.file-status');
            const statusText = dropzone.querySelector('.file-status-text');
            const clearButton = dropzone.querySelector('.file-clear-button');

            function updateDropzone(file) {
                if (file) {
                    dropzone.classList.add('file-ready');
                    prompt.classList.add('hidden');
                    status.classList.remove('hidden');
                    statusText.textContent = `✓ ${file.name} Ready`;
                } else {
                    dropzone.classList.remove('file-ready');
                    prompt.classList.remove('hidden');
                    status.classList.add('hidden');
                    statusText.textContent = '';
                    input.value = '';
                }
            }

            clearButton.addEventListener('click', (event) => {
                event.stopPropagation();
                updateDropzone(null);
            });

            input.addEventListener('change', () => {
                updateDropzone(input.files[0]);
            });

            ['dragenter', 'dragover'].forEach((eventName) => {
                dropzone.addEventListener(eventName, (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    dropzone.classList.add('file-over');
                });
            });

            ['dragleave', 'drop', 'dragend'].forEach((eventName) => {
                dropzone.addEventListener(eventName, (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    dropzone.classList.remove('file-over');
                });
            });

            dropzone.addEventListener('drop', (event) => {
                const droppedFiles = event.dataTransfer?.files;
                if (!droppedFiles || !droppedFiles.length) return;
                const dt = new DataTransfer();
                dt.items.add(droppedFiles[0]);
                input.files = dt.files;
                updateDropzone(droppedFiles[0]);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            initFileDropzone('upload-personal-photo', 'personal-photo-dropzone');
            initFileDropzone('upload-id-cert', 'id-cert-dropzone');
        });
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="../lang.js"></script>
    <script src="../app.js"></script>
    <script>
    (function() {
        var attempts = 0;
        var guard = setInterval(function() {
            attempts++;
            if (window.firebaseAuthInstance) {
                clearInterval(guard);
                window.firebaseAuthInstance.onAuthStateChanged(function(user) {
                    if (!user) renderBlock();
                });
            }
            if (attempts > 200) {
                clearInterval(guard);
                if (!window.currentAuthUser) renderBlock();
            }
        }, 50);

        function renderBlock() {
            if (document.getElementById('auth-protection-overlay')) return;
            var o = document.createElement('div');
            o.id = 'auth-protection-overlay';
            o.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(6,14,40,0.98);display:flex;align-items:center;justify-content:center;z-index:10000;flex-direction:column;gap:20px;';
            o.innerHTML = '<div style="text-align:center;color:white;background:rgba(255,255,255,0.05);padding:40px;border-radius:16px;border:1px solid rgba(255,255,255,0.1);max-width:450px;font-family:sans-serif;"><h2 style="margin:0 0 15px;font-size:24px;color:#7eb8f7;">Sign In Required</h2><p style="margin:0 0 15px;font-size:15px;color:rgba(255,255,255,0.8);line-height:1.6;">You must be logged into a Nasser Scouts account to submit forms.</p><p style="margin:0;font-size:13px;color:rgba(230,240,255,0.4);">Redirecting you to the entry portal...</p></div>';
            document.body.insertBefore(o, document.body.firstChild);
            document.body.style.overflow = 'hidden';
            var c = document.querySelector('.application-page');
            if (c) c.style.display = 'none';
            setTimeout(function() { window.location.href = '../login.html'; }, 1800);
        }
    })();
    </script>
</body>
</html>
