    <div class="application-page">
        <div class="application-banner">
            <img src="../assets/images/app.jpeg" alt="Leader registration banner">
        </div>

        <section class="application-header">
            <h1>Leader Registration</h1>
            <p>Apply to serve as a Scout Leader. Submit your details and verification files below.</p>
        </section>

        <div class="application-card">
            <form id="leader-application-form">
                <div class="form-grid">
                    <div class="input-group">
                        <label for="full-name">Full Name</label>
                        <input id="full-name" type="text" placeholder="Enter your full name" class="input" required>
                    </div>
                    <div class="input-group">
                        <label for="id-number">National ID</label>
                        <input id="id-number" type="text" placeholder="Enter National ID" class="input" required>
                    </div>
                    <div class="input-group">
                        <label for="telephone">Telephone Number</label>
                        <input id="telephone" type="tel" placeholder="Enter telephone number" class="input" required>
                    </div>
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input id="email" type="email" placeholder="Enter email address" class="input" required>
                    </div>
                </div>

                <label style="display:block; margin-top:15px; color:var(--text-secondary);">Date of Birth</label>
                <div class="birth-row" style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <input id="birth-day" type="number" placeholder="Day" min="1" max="31" class="input" required>
                    <input id="birth-month" type="number" placeholder="Month" min="1" max="12" class="input" required>
                    <input id="birth-year" type="number" placeholder="Year" min="1900" max="2026" class="input" required>
                </div>

                <div class="file-row" style="margin-top:20px; display:grid; gap:15px;">
                    <div class="file-drop-area" id="personal-photo-dropzone">
                        <span class="file-prompt">📷 Drag & drop a photo or browse</span>
                        <div class="file-status hidden">
                            <span class="file-status-text"></span>
                            <button type="button" class="file-clear-button" aria-label="Clear selected personal photo">×</button>
                        </div>
                        <input id="upload-personal-photo" type="file" accept="image/*" required>
                    </div>
                    <div class="file-drop-area" id="id-cert-dropzone">
                        <span class="file-prompt">📄 Drag & drop an ID card copy or browse</span>
                        <div class="file-status hidden">
                            <span class="file-status-text"></span>
                            <button type="button" class="file-clear-button" aria-label="Clear selected document">×</button>
                        </div>
                        <input id="upload-id-cert" type="file" accept="image/*,application/pdf" required>
                    </div>
                </div>

                <button type="submit" class="register" style="margin-top:25px;">Submit Application</button>
            </form>
        </div>
    </div>
    <script>
        function initFileDropzone(inputId, dropzoneId) {
            const input = document.getElementById(inputId);
            const dropzone = document.getElementById(dropzoneId);
            if (!input || !dropzone) return;

            const prompt = dropzone.querySelector('.file-prompt');
            const status = dropzone.querySelector('.file-status');
            const statusText = dropzone.querySelector('.file-status-text');
            const clearButton = dropzone.querySelector('.file-clear-button');

            function updateDropzone(file) {
                if (file) {
                    dropzone.classList.add('file-ready');
                    prompt.classList.add('hidden');
                    status.classList.remove('hidden');
                    statusText.textContent = `✓ ${file.name} Ready`;
                } else {
                    dropzone.classList.remove('file-ready');
                    prompt.classList.remove('hidden');
                    status.classList.add('hidden');
                    statusText.textContent = '';
                    input.value = '';
                }
            }

            clearButton.addEventListener('click', (event) => {
                event.stopPropagation();
                updateDropzone(null);
            });

            input.addEventListener('change', () => {
                updateDropzone(input.files[0]);
            });

            ['dragenter', 'dragover'].forEach((eventName) => {
                dropzone.addEventListener(eventName, (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    dropzone.classList.add('file-over');
                });
            });

            ['dragleave', 'drop', 'dragend'].forEach((eventName) => {
                dropzone.addEventListener(eventName, (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    dropzone.classList.remove('file-over');
                });
            });

            dropzone.addEventListener('drop', (event) => {
                const droppedFiles = event.dataTransfer?.files;
                if (!droppedFiles || !droppedFiles.length) return;
                const dt = new DataTransfer();
                dt.items.add(droppedFiles[0]);
                input.files = dt.files;
                updateDropzone(droppedFiles[0]);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            initFileDropzone('upload-personal-photo', 'personal-photo-dropzone');
            initFileDropzone('upload-id-cert', 'id-cert-dropzone');
        });
    </script>
    <script type="module" src="../app.js"></script>
</body>
</html>
