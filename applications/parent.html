<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="parent-title-tag">Parent Application - Nasser Scouts</title>
    <link rel="icon" href="../assets/images/favicon.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="shortcut icon" href="../assets/images/logo.svg" type="image/x-icon">
</head>
<body>
    <a href="../index.html" class="back" data-i18n="parent-back">← Back</a>
    <div class="application-page">
        <div class="application-banner">
            <img src="../assets/images/app.jpeg" alt="Parent application banner">
        </div>

        <section class="application-header">
            <h1 data-i18n="parent-page-title">Parent Registration</h1>
            <p data-i18n="parent-page-desc">Tell us about your family and how many children are joining Nasser Scouts.</p>
        </section>

        <div class="application-card">
            <form id="parent-application-form">
                <div class="form-grid">
                    <div class="input-group">
                        <label for="parent-name" data-i18n="parent-name-label">Parent Full Name</label>
                        <input id="parent-name" type="text" class="input" required data-i18n-placeholder="parent-name-placeholder" placeholder="Enter parent full name">
                    </div>
                    <div class="input-group">
                        <label for="parent-id" data-i18n="parent-id-label">National ID</label>
                        <input id="parent-id" type="text" class="input" required data-i18n-placeholder="parent-id-placeholder" placeholder="Enter national ID">
                    </div>
                    <div class="input-group">
                        <label for="parent-phone" data-i18n="parent-phone-label">Telephone Number</label>
                        <input id="parent-phone" type="tel" class="input" required data-i18n-placeholder="parent-phone-placeholder" placeholder="Enter telephone number">
                    </div>
                    <div class="input-group">
                        <label for="parent-email" data-i18n="parent-email-label">Email Address</label>
                        <input id="parent-email" type="email" class="input" required data-i18n-placeholder="parent-email-placeholder" placeholder="Enter email address">
                    </div>
                </div>

                <div class="input-group">
                    <label for="children-count" data-i18n="parent-children-label">How Many Children</label>
                    <input id="children-count" type="number" class="input" required data-i18n-placeholder="parent-children-placeholder" placeholder="How many children want to join?" min="1" max="10">
                </div>

                <div class="children-names-container" id="children-names-container"></div>

                <div class="checkbox-group">
                    <input type="checkbox" id="parent-terms" required>
                    <label for="parent-terms" data-i18n="parent-terms">I agree that I have read the Safe from Harm policies and group bylaws.</label>
                </div>

                <button type="submit" class="register" data-i18n="parent-submit">Submit Application</button>
            </form>
        </div>
    </div>

    <script>
        const countInput = document.querySelector('#children-count');
        const container = document.querySelector('#children-names-container');

        countInput.addEventListener('input', () => {
            container.innerHTML = '';
            const count = parseInt(countInput.value, 10);
            if (!count || count < 1) return;
            
            for(let i = 1; i <= count; i++) {
                const div = document.createElement('div');
                div.className = 'field';
                div.style.marginBottom = '10px';
                div.innerHTML = `<input type="text" placeholder="Child #${i} Full Name" class="input child-name-field" required>`;
                container.appendChild(div);
            }
        });
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="../lang.js"></script>
    <script src="../app.js"></script>
    <script>
    (function() {
        var attempts = 0;
        var guard = setInterval(function() {
            attempts++;
            if (window.firebaseAuthInstance) {
                clearInterval(guard);
                window.firebaseAuthInstance.onAuthStateChanged(function(user) {
                    if (!user) renderBlock();
                });
            }
            if (attempts > 200) {
                clearInterval(guard);
                if (!window.currentAuthUser) renderBlock();
            }
        }, 50);

        function renderBlock() {
            if (document.getElementById('auth-protection-overlay')) return;
            var o = document.createElement('div');
            o.id = 'auth-protection-overlay';
            o.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(6,14,40,0.98);display:flex;align-items:center;justify-content:center;z-index:10000;flex-direction:column;gap:20px;';
            o.innerHTML = '<div style="text-align:center;color:white;background:rgba(255,255,255,0.05);padding:40px;border-radius:16px;border:1px solid rgba(255,255,255,0.1);max-width:450px;font-family:sans-serif;"><h2 style="margin:0 0 15px;font-size:24px;color:#7eb8f7;">Sign In Required</h2><p style="margin:0 0 15px;font-size:15px;color:rgba(255,255,255,0.8);line-height:1.6;">You must be logged into a Nasser Scouts account to submit forms.</p><p style="margin:0;font-size:13px;color:rgba(230,240,255,0.4);">Redirecting you to the entry portal...</p></div>';
            document.body.insertBefore(o, document.body.firstChild);
            document.body.style.overflow = 'hidden';
            var c = document.querySelector('.application-page');
            if (c) c.style.display = 'none';
            setTimeout(function() { window.location.href = '../login.html'; }, 1800);
        }
    })();
    </script>
</body>
</html>
