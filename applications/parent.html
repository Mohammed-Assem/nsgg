    <div class="application-page">
        <div class="application-banner">
            <img src="../assets/images/app.jpeg" alt="Parent application banner">
        </div>

        <section class="application-header">
            <h1>Parent Registration</h1>
            <p>Tell us about your family and how many children are joining Nasser Scouts.</p>
        </section>

        <div class="application-card">
            <form id="parent-application-form">
                <div class="form-grid">
                    <div class="input-group">
                        <label for="parent-name">Parent Full Name</label>
                        <input id="parent-name" type="text" placeholder="Enter parent full name" class="input" required>
                    </div>
                    <div class="input-group">
                        <label for="parent-id">National ID</label>
                        <input id="parent-id" type="text" placeholder="Enter national ID" class="input" required>
                    </div>
                    <div class="input-group">
                        <label for="parent-phone">Telephone Number</label>
                        <input id="parent-phone" type="tel" placeholder="Enter telephone number" class="input" required>
                    </div>
                    <div class="input-group">
                        <label for="parent-email">Email Address</label>
                        <input id="parent-email" type="email" placeholder="Enter email address" class="input" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="children-count">How Many Children</label>
                    <input id="children-count" type="number" placeholder="How many children want to join?" min="1" max="10" class="input" required>
                </div>

                <div class="children-names-container" id="children-names-container"></div>

                <div class="checkbox-group">
                    <input type="checkbox" id="parent-terms" required>
                    <label for="parent-terms">I agree that I have read the Safe from Harm policies and group bylaws.</label>
                </div>

                <button type="submit" class="register">Submit Application</button>
            </form>
        </div>
    </div>

    <script>
        const countInput = document.querySelector('#children-count');
        const container = document.querySelector('#children-names-container');

        countInput.addEventListener('input', () => {
            container.innerHTML = '';
            const count = parseInt(countInput.value, 10);
            if (!count || count < 1) return;
            
            for(let i = 1; i <= count; i++) {
                const div = document.createElement('div');
                div.className = 'field';
                div.style.marginBottom = '10px';
                div.innerHTML = `<input type="text" placeholder="Child #${i} Full Name" class="input child-name-field" required>`;
                container.appendChild(div);
            }
        });
    </script>
    <script type="module" src="../app.js"></script>
</body>
</html>
