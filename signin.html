<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="icon" href="../assets/images/favicon.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="shortcut icon" href="../assets/images/logo.svg" type="image/x-icon">
</head>
<body>
    <nav class="header">
        <a href="index.html" class="logo-wrap">
            <img src="assets/images/logo.svg" alt="Nasser Scouts Logo" class="logoimage">
            <div class="logo-text">
                <span class="logo-name">Nasser Scouts</span>
                <span class="logo-sub">Qalyubia</span>
            </div>
        </a>
        <div class="nav-right">
            <ul class="navlinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html">About Us</a></li>
                <li><a href="achi.html">Achievements</a></li>
                <li><a href="event.html">Events</a></li>
                <li><button id="lang-toggle" class="lang-btn">English</button></li>
            </ul>
            
        </div>
    </nav>

    <div class="page hero">

        <div class="card">
    <h2 class="card-title">Sign In</h2>

    <form id="signup-form">
        <div class="field">
            <input id="signup-fullname" type="text" placeholder="Full Name" class="input" required>
        </div>

        <div class="field">
            <input id="signup-email" type="email" placeholder="Email" class="input" required>
        </div>

        <div class="field">
            <input id="signup-password" type="password" placeholder="Password" class="input" required>
        </div>

        <label class="terms">
            <input type="checkbox" id="signup-terms" required> I agree to the terms & conditions
        </label>

        <button type="submit" class="register" id="signup-btn">Register</button>
        
        <div id="signup-error" class="error-feedback" aria-live="polite" style="color: #ff6b6b; margin-top: 10px; font-size: 14px; text-align: center;"></div>
    </form>

    <p class="login">Already have an account? <a href="login.html">Login</a></p>
</div>
    </div>
    <script type="module" src="app.js"></script>

    
</body>
</html>
