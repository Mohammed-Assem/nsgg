<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="signin-title-tag">Sign In - Nasser Scouts</title>
    <link rel="icon" href="assets/images/favicon.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="assets/images/logo.svg" type="image/x-icon">
</head>
<body>
    <nav class="header">
        <a href="index.html" class="logo-wrap">
            <img src="assets/images/logo.svg" alt="Nasser Scouts Logo" class="logoimage">
            <div class="logo-text">
                <span class="logo-name">Nasser Scouts</span>
                <span class="logo-sub">Qalyubia</span>
            </div>
        </a>
        <div class="nav-right">
            <ul class="navlinks">
                <li><a href="index.html" data-i18n="nav-home">Home</a></li>
                <li><a href="index.html" data-i18n="nav-about">About Us</a></li>
                <li><a href="achi.html" data-i18n="nav-achievements">Achievements</a></li>
                <li><a href="event.html" data-i18n="nav-events">Events</a></li>
                <li><button id="lang-toggle" class="lang-btn">English</button></li>
            </ul>
            
        </div>
    </nav>

    <div class="page hero">

        <div class="card">
    <h2 class="card-title" data-i18n="signin-title">Sign In</h2>

    <form id="signup-form">
        <div class="field">
            <input id="signup-fullname" type="text" class="input" required data-i18n-placeholder="signin-fullname-placeholder" placeholder="Full Name">
        </div>

        <div class="field">
            <input id="signup-email" type="email" class="input" required data-i18n-placeholder="signin-email-placeholder" placeholder="Email">
        </div>

        <div class="field">
            <input id="signup-password" type="password" class="input" required data-i18n-placeholder="signin-password-placeholder" placeholder="Password">
        </div>

        <label class="terms">
            <input type="checkbox" id="signup-terms" required> <span data-i18n="signin-terms">I agree to the terms & conditions</span>
        </label>

        <button type="submit" class="register" id="signup-btn" data-i18n="signin-btn">Register</button>
        
        <div id="signup-error" class="error-feedback" aria-live="polite" style="color: #ff6b6b; margin-top: 10px; font-size: 14px; text-align: center;"></div>
    </form>

    <p class="login"><span data-i18n="signin-login-link">Already have an account?</span> <a href="login.html" data-i18n="signin-login-link-text">Login</a></p>
</div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="lang.js"></script>
    <script src="app.js"></script>
    <script>if (typeof setupSignupForm === 'function') setupSignupForm();</script>

    
</body>
</html>
